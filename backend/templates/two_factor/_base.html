<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY AGRINUTRITION - Secure Gateway</title>
</head>
<body style="background-color: #0b0f19; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;">

<div style="max-width: 450px; width: 90%; padding: 40px; background: #0f172a; color: #ffffff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; box-sizing: border-box;">
    
    <div style="text-align: center; margin-bottom: 30px;">
        <h2 style="color: #38bdf8; margin-bottom: 5px; font-weight: 600; letter-spacing: 0.5px;">MY AGRINUTRITION</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-top: 0;">Secure Gateway Authentication</p>
    </div>
    
    {% block extra_media %}{% endblock %}
    
    <div class="auth-box-content">
        {% block content %}{% endblock %}
    </div>

</div>

<style>
    /* Styles all matching input components rendered by the 2FA system */
    .auth-box-content {
        color: #cbd5e1 !important;
        font-size: 15px;
        line-height: 1.6;
    }
    .auth-box-content p {
        color: #94a3b8;
        margin-bottom: 20px;
    }
    .auth-box-content label { 
        color: #cbd5e1 !important; 
        font-weight: 500; 
        display: block; 
        margin-top: 15px; 
        margin-bottom: 6px; 
    }
    .auth-box-content input[type="text"], 
    .auth-box-content input[type="password"], 
    .auth-box-content input[type="number"],
    .auth-box-content select { 
        width: 100%; 
        padding: 12px; 
        border-radius: 6px; 
        border: 1px solid #334155; 
        background: #1e293b; 
        color: #ffffff; 
        box-sizing: border-box;
        font-size: 15px;
    }
    .auth-box-content input:focus {
        border-color: #38bdf8;
        outline: none;
    }
    /* Styles the Wizard Buttons */
    .auth-box-content button, 
    .auth-box-content input[type="submit"] {
        width: 100%; 
        background: #0284c7; 
        color: white; 
        padding: 12px; 
        border: none; 
        border-radius: 6px; 
        font-weight: 600; 
        cursor: pointer; 
        margin-top: 25px; 
        font-size: 15px;
        transition: background 0.2s;
    }
    .auth-box-content button:hover, 
    .auth-box-content input[type="submit"]:hover { 
        background: #0369a1; 
    }
    .auth-box-content a { 
        color: #38bdf8; 
        text-decoration: none; 
    }
</style>

</body>
</html>
