{% extends "registration/_base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; font-family: sans-serif;">
    <h2>Executive Signup</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Sign Up
        </button>
    </form>
    <p style="margin-top: 15px; text-align: center;">
        Already have an account? <a href="{% url 'two_factor:login' %}">Log In</a>
    </p>
</div>
{% endblock %}
