<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Field Order</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <h2>📝 Log Field Order</h2>
    <h3>Client: <strong>{{ client.business_name }}</strong></h3>
    <p>Current Status: {{ client.get_status_display }}</p>

    <hr>

    <form method="POST">
        {% csrf_block %}
        
        <label for="order_total">Order Total Amount ($):</label>
        <input type="number" id="order_total" name="order_total" step="0.01" min="0.01" placeholder="0.00" required inputmode="decimal" style="font-size: 1.2rem;">

        <label for="notes">Order Notes / SKUs Handed Over:</label>
        <textarea id="notes" name="notes" rows="4" placeholder="Mention quantities or items requested..."></textarea>

        <button type="submit" style="width: 100%; padding: 12px; margin-top: 15px; background-color: #28a745; color: white;">
            Submit Order & Finalize Deal
        </button>
    </form>

    <br>
    <a href="#">⬅️ Back to Client Profile</a>
</body>
</html>
