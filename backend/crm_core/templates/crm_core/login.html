<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAgrinutrition CRM - Secure Portal Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { max-width: 450px; margin: 60px auto; padding: 20px; }
        .card { 
            background: #ffffff; 
            border: 1px solid #cbd5e1; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card form, .card p { color: #334155 !important; }
        .card input[type="text"], 
        .card input[type="email"], 
        .card input[type="password"] {
            color: #0f172a !important;
            background-color: #f8fafc !important;
            border: 1px solid #cbd5e1 !important;
            width: 100%;
        }
        h2 { color: #0284c7; text-align: center; margin-bottom: 20px; }
        button { width: 100%; background-color: #0284c7; font-weight: bold; padding: 12px; margin-top: 15px; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0369a1; }
        
        /* Utility styles for the new links matrix */
        .utility-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #64748b;
        }
        .utility-row label {
            display: inline-flex;
            align-items: center;
            color: #64748b !important;
            cursor: pointer;
            user-select: none;
        }
        .utility-row input[type="checkbox"] {
            margin-right: 6px;
            margin-top: 0;
            margin-bottom: 0;
            cursor: pointer;
        }
        .utility-row a {
            color: #0284c7;
            text-decoration: none;
            font-weight: bold;
        }
        .utility-row a:hover {
            text-decoration: underline;
        }

        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #64748b; border-t: 1px solid #e2e8f0; padding-top: 15px; }
        .footer-link a { color: #0284c7; text-decoration: none; font-weight: bold; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔒 MyAgrinutrition CRM Login</h2>
        <form method="POST">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <!-- 🔐 Keep signed in & Recovery vector mappings -->
            <div class="utility-row">
                <label>
                    <input type="checkbox" name="remember_me"> Keep me signed in
                </label>
                <a href="{% url 'password_reset' %}">
                    Forgot Password?
                </a>
            </div>
            
            <button type="submit">Access Operation Dashboard</button>
        </form>
        
        <div class="footer-link">
            New field executive? <a href="/crm/register/">Create an Account</a>
        </div>
    </div>
</body>
</html>
