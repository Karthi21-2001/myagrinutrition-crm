<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Recovery - MyAgrinutrition CRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { max-width: 450px; margin: 60px auto; padding: 20px; }
        .card { 
            background: #ffffff; 
            border: 1px solid #cbd5e1; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card form, .card p { color: #334155 !important; }
        .card input[type="email"], .card input[type="text"] {
            color: #0f172a !important;
            background-color: #f8fafc !important;
            border: 1px solid #cbd5e1 !important;
            width: 100%;
        }
        h2 { color: #0284c7; text-align: center; margin-bottom: 10px; }
        .info-text { text-align: center; font-size: 0.9rem; color: #64748b; margin-bottom: 25px; }
        button { width: 100%; background-color: #0284c7; font-weight: bold; padding: 12px; margin-top: 15px; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0369a1; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #64748b; border-top: 1px solid #e2e8f0; padding-top: 15px; }
        .footer-link a { color: #0284c7; text-decoration: none; font-weight: bold; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔑 Recover Password</h2>
        <p class="info-text">Enter your registered email below, and we will dispatch a secure token link to reset your account password.</p>
        
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Send Reset Recovery Link</button>
        </form>
        
        <div class="footer-link">
            Remembered your credentials? <a href="{% url 'two_factor:login' %}">Return to Login</a>
        </div>
    </div>
</body>
</html>
